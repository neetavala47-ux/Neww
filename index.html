<!DOCTYPE html>
<html>

<head>
<title>For My Darling 💗</title>

<style>
/* ---------- CSS ---------- */

body {
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  text-align: center;
  font-family: Arial;
  overflow: hidden;
  padding-top: 100px;
}

h1 {
  color: white;
  font-size: 40px;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: red;
  color: white;
  cursor: pointer;
}

#message {
  margin-top: 20px;
  font-size: 22px;
  color: white;
  display: none;
}

.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { top: -10px; }
  100% { top: 100vh; }
}

</style>

</head>

<body>

<!-- ---------- HTML ---------- -->

<h1>Darllingg 💗🥹</h1>

<button onclick="showMessage()">Touch Mee 🥺</button>

<div id="message">
I know that it's first time for us, but I will be back in just a month 🫂🖤🤍<br><br>
Please mari jaan nu dhyan rakhje 🥹<br><br>
I will miss you so much 🫂<br><br>
I am always all yours 😚🧿
</div>

<!-- ---------- JS ---------- -->

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";
}

setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 500);
</script>

</body>
</html>
